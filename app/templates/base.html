<!doctype html>
<html lang="sv">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{% block title %}Pipefire{% endblock %}</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/htmx.org@1.9.12"></script>
<script src="https://unpkg.com/htmx.org@1.9.12/dist/ext/sse.js"></script>
<script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
<link rel="stylesheet" href="/static/app.css">
</head>
<body class="bg-slate-50 text-slate-800">
<nav class="bg-white border-b border-slate-200">
  <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
    <a href="/" class="text-lg font-bold text-orange-600">🔥 Pipefire</a>
    <div class="flex items-center gap-4 text-sm">
      <a href="/" class="text-slate-600 hover:text-slate-900">Dashboard</a>
      <a href="/campaigns/new" class="text-slate-600 hover:text-slate-900">Ny kampanj</a>
      <span hx-get="/auth/gmail/status" hx-trigger="load">
        {% if gmail_authorized() %}
          <span class="text-green-700 text-xs">● Gmail kopplat</span>
        {% else %}
          <a href="/auth/gmail" class="text-red-600 text-xs underline">● Koppla Gmail</a>
        {% endif %}
      </span>
    </div>
  </div>
</nav>
<main class="max-w-7xl mx-auto px-4 py-6">
  {% block content %}{% endblock %}
</main>
</body>
</html>
